<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mining Pay</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial;padding:16px}
.top{background:linear-gradient(135deg,#7c3aed,#06b6d4);padding:25px;border-radius:25px;text-align:center}
.card{background:#1e293b;padding:16px;border-radius:20px;margin-top:15px}
button{width:100%;padding:14px;border:none;border-radius:14px;background:#22c55e;color:white;font-size:18px}
input{width:100%;padding:12px;border:none;border-radius:12px;margin-top:10px}
.nav{position:fixed;bottom:0;left:0;right:0;background:#111827;padding:14px;display:flex;justify-content:space-around}
.small{opacity:.8}
</style>
</head>
<body>

<h2>Mining Pay</h2>

<div class='top'>
<h3>Total Balance</h3>
<h1 id='bal'>0 Pay-USDT</h1>
<p class='small'>Daily Profit: 5%</p>
</div>

<div class='card'>
<h3>⛏ Mining Center</h3>
<p>Tap and earn coins</p>
<button onclick='mine()'>Start Mining</button>
</div>

<div class='card'>
<h3>💰 Withdraw</h3>
<input id="wallet" placeholder='Binance Pay ID'>
<input id="amount" placeholder='Amount'>
<br><br>
<button onclick="withdraw()">Submit Request</button>
</div>

<div class='card'>
<h3>👥 Referral</h3>
<p>Invite friends and earn bonus</p>
<button onclick="copyReferral()">Copy Referral Link</button>
</div>

<div class='nav'>🏠 Home 💳 Wallet 👤 Profile</div>

<script>
const API = "mongodb://atlas-sql-6a0810912535ffb6f8c80cc7-x21yg9.a.query.mongodb.net/miningpay2?ssl=true&authSource=admin";

// Telegram user id (Mini App থেকে আসবে)
const tg = window.Telegram?.WebApp;
tg?.ready();
const userId = tg?.initDataUnsafe?.user?.id || "demo_user";

let balance = 0;

// ---------------- LOAD USER ----------------
async function loadUser(){
  try{
    let res = await fetch(`${API}/user/${userId}`);
    let data = await res.json();

    balance = data.balance || 0;
    document.getElementById('bal').innerText = balance + " Pay-USDT";
  }catch(e){
    console.log(e);
  }
}

// ---------------- MINE ----------------
async function mine(){
  try{
    let res = await fetch(`${API}/mine`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ id:userId })
    });

    let data = await res.json();

    balance = data.balance;
    document.getElementById('bal').innerText = balance + " Pay-USDT";

  }catch(e){
    console.log(e);
  }
}

// ---------------- WITHDRAW ----------------
async function withdraw(){
  let wallet = document.getElementById("wallet").value;
  let amount = document.getElementById("amount").value;

  if(!wallet || !amount){
    alert("Fill all fields");
    return;
  }

  try{
    let res = await fetch(`${API}/withdraw`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        id:userId,
        wallet,
        amount:Number(amount)
      })
    });

    let data = await res.json();

    if(data.error){
      alert(data.error);
    }else{
      alert("Withdraw request sent");
      loadUser();
    }

  }catch(e){
    console.log(e);
  }
}

// ---------------- REFERRAL ----------------
function copyReferral(){
  const link = `https://t.me/YOUR_BOT?start=${userId}`;
  navigator.clipboard.writeText(link);
  alert("Referral link copied!");
}

// INIT
loadUser();
</script>

</body>
</html>
