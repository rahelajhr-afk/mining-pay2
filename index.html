<script>

window.Telegram.WebApp.ready();
window.Telegram.WebApp.expand();

const tg = window.Telegram.WebApp;

let user = tg.initDataUnsafe?.user;

let telegramId;
let username;

if(user){

 telegramId=String(user.id);

 username=
 user.first_name||
 "User";

}else{

 telegramId=
 "demo_"+
 Date.now()+
 Math.floor(
 Math.random()*99999
 );

 username=
 "DemoUser";

}

const uid=
"UID_"+telegramId;


document
.getElementById(
"profileData"
)

.innerHTML=

`

<h2>Profile</h2>

UID:
${uid}

<br><br>

Username:
${username}

`;


document
.getElementById(
"refLink"
)

.value=

"https://t.me/MiningPayBot?start="+uid;


let balance=

parseFloat(

localStorage.getItem(
"bal_"+telegramId
)||0

);

document
.getElementById(
"balance"
)

.innerText=

balance.toFixed(2)+
" PAY USDT";


document
.getElementById(
"refs"
)

.innerText=

localStorage.getItem(
"refs_"+telegramId
)||0;


function copyRef(){

navigator.clipboard.writeText(

document
.getElementById(
"refLink"
).value

);

alert("Copied");

}

</script>
