<h1>Mining Pay</h1>

<div class="box">
<h2>Balance</h2>
<h1 id="bal">0 Pay-USDT</h1>
</div>

<div class="card">
<h3>⛏ Mining</h3>
<button onclick="mine()">Start Mining</button>
</div>

<script>
let balance = localStorage.getItem("bal") || 0;

document.getElementById("bal").innerText =
balance + " Pay-USDT";

function mine(){

balance = Number(balance)+1;

localStorage.setItem("bal",balance);

document.getElementById("bal").innerText =
balance + " Pay-USDT";

}
</script>
