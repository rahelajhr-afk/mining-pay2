<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pay USDT</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(circle at top right, rgba(30, 58, 138, 0.7) 0%, rgba(3, 7, 18, 0.9) 100%), 
                url('https://raw.githubusercontent.com/Akibul555/image/refs/heads/main/background.webp');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-color: #000000;
    color: #ffffff;
    padding-bottom: 90px;
    min-height: 100vh;
}

.bg {
    position: fixed;
    top: 30%;
    left: 5%;
    font-size: 60px;
    font-weight: bold;
    opacity: .03;
}

.card h2, p#timer, .profile-uid, .user-display-name {
    color: #4ade80;
    text-shadow: 0 0 10px #4ade80, 0 0 20px #22c55e;
}

.user-display-name {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 5px;
}

.profile-uid {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.7);
    text-shadow: none !important;
    background: rgba(255, 255, 255, 0.1);
    padding: 4px 10px;
    border-radius: 8px;
    display: inline-block;
}

.card {
    margin: 15px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(17, 25, 40, 0.75);
    backdrop-filter: blur(8px) saturate(180%);
    border: 1px solid rgba(74, 222, 128, 0.2);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
}

button {
    width: 100%;
    padding: 14px;
    border: 1px solid #4ade80;
    border-radius: 14px;
    margin-top: 10px;
    cursor: pointer;
    background: rgba(74, 222, 128, 0.1);
    color: #4ade80;
    font-weight: bold;
    font-size: 16px;
    text-transform: uppercase;
    transition: 0.3s;
}

button:hover {
    background: rgba(74, 222, 128, 0.3);
    box-shadow: 0 0 15px #4ade80;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: 1px solid rgba(6, 182, 212, 0.3);
    background: rgba(0, 0, 0, 0.5);
    color: white;
    border-radius: 14px;
    box-sizing: border-box;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: #06b6d4;
    box-shadow: 0 0 10px #06b6d4;
}

.bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    display: flex;
    background: #000000;
    border-top: 2px solid #06b6d4;
}

.bottom button {
    margin: 0;
    border: none;
    border-radius: 0;
    color: rgba(255, 255, 255, 0.6);
    background: none;
    text-shadow: none;
}

.bottom button:hover, .bottom button.active {
    color: #06b6d4;
    text-shadow: 0 0 10px #06b6d4;
    background: rgba(6, 182, 212, 0.1);
}

.hide {
    display: none;
}
</style>
</head>

<body>

<div class="bg">PAY USDT</div>

<div id="home" class="page">
<div class="card">
<h2>Balance</h2>
<p id="balance">Loading...</p>
</div>

<div class="card">
<h2>Mining</h2>
<h1 id="timer">Loading...</h1>
<button id="claimBtn">Claim 0.05</button>
</div>
</div>

<div id="refer" class="page hide">
<div class="card">
<h2>Referral</h2>
<p>Reward: 0.20 PAY USDT</p>
<p>Referrals: <span id="refs">0</span></p>
<input id="refLink" readonly>
<button onclick="copyRef()">Copy Link</button>
</div>
</div>

<div id="withdraw" class="page hide">
<div class="card">
<h2>Withdraw</h2>
<input placeholder="Binance ID">
<input placeholder="Amount">
<button>Withdraw</button>
<p>Minimum: 2 PAY USDT</p>
<p>Payment: 3-7 days</p>
</div>
</div>

<div id="profile" class="page hide">
<div class="card" id="profileData">Loading...</div>
</div>

<div class="bottom">
<button onclick="show('home')">Home</button>
<button onclick="show('refer')">Refer</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="show('profile')">Profile</button>
</div>

<script>
// আপনার দেওয়া একদম নতুন Web App URL লিংকটি এখানে বসানো হয়েছে
let DATABASE_URL = "https://script.google.com/macros/s/AKfycbzP1EYiz5Nwm3i5YBZPJ2abLrODSWSHEtvMYLP9Xn5lMvgCmYnz6z-9ShiPy7im2ZQaEQ/exec";

let username = "User";
let telegramId = "";
let startParam = "";
let balance = 0.00;
let totalRefs = 0;

try {
    if (window.Telegram && window.Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        const user = Telegram.WebApp.initDataUnsafe?.user;
        if (user) {
            username = user.first_name || "User";
            telegramId = String(user.id);
        }
        startParam = Telegram.WebApp.initDataUnsafe?.start_param || "";
    }
} catch (e) {
    console.error(e);
}

if (!telegramId) {
    telegramId = localStorage.getItem("demoId");
    if (!telegramId) {
        telegramId = String(Date.now() + Math.floor(Math.random() * 99999));
        localStorage.setItem("demoId", telegramId);
    }
}

let uid = "UID_" + telegramId;

document.getElementById("profileData").innerHTML = `
    <h2>Profile</h2>
    <div class="user-display-name">${username}</div>
    <div class="profile-uid">UID: ${uid}</div>
`;

document.getElementById("refLink").value = "https://t.me/Miningtestpaybot?start=" + telegramId;

function loadUserData() {
    let url = DATABASE_URL + "?action=getUser&telegramId=" + telegramId + "&startParam=" + startParam;
    
    fetch(url)
    .then(res => res.json())
    .then(data => {
        if(data) {
            balance = parseFloat(data.balance || 0);
            totalRefs = parseInt(data.referrals || 0);
            updateUI();
        }
    }).catch(err => {
        console.error(err);
        balance = parseFloat(localStorage.getItem("bal_" + telegramId) || 0);
        totalRefs = parseInt(localStorage.getItem("refs_" + telegramId) || 0);
        updateUI();
    });
}

function updateUI() {
    document.getElementById("balance").innerText = balance.toFixed(2) + " PAY USDT";
    document.getElementById("refs").innerText = totalRefs;
}

function syncBalanceWithDatabase(newBalance) {
    localStorage.setItem("bal_" + telegramId, newBalance);
    let url = DATABASE_URL + "?action=updateBalance&telegramId=" + telegramId + "&balance=" + newBalance;
    fetch(url);
}

function copyRef() {
    const copyText = document.getElementById("refLink");
    copyText.select();
    navigator.clipboard.writeText(copyText.value);
    alert("Copied");
}

function show(id) {
    document.querySelectorAll(".page").forEach(e => {
        e.classList.add("hide");
    });
    document.getElementById(id).classList.remove("hide");
    
    document.querySelectorAll(".bottom button").forEach(b => b.classList.remove("active"));
    event.currentTarget.classList.add("active");
}

let last = localStorage.getItem("last_" + telegramId) || 0;

function update() {
    let now = Date.now();
    let diff = 86400000 - (now - last);

    if (diff <= 0) {
        document.getElementById("timer").innerText = "Ready";
    } else {
        let h = Math.floor(diff / 1000 / 60 / 60);
        let m = Math.floor((diff / 1000 / 60) % 60);
        let s = Math.floor((diff / 1000) % 60);
        document.getElementById("timer").innerText = h + ":" + m + ":" + s;
    }
}

setInterval(update, 1000);
update();

document.getElementById("claimBtn").onclick = () => {
    let now = Date.now();
    if (now - last >= 86400000) {
        balance += 0.05;
        syncBalanceWithDatabase(balance);
        localStorage.setItem("last_" + telegramId, now);
        location.reload();
    } else {
        alert("Come after 24h");
    }
}

loadUserData();
</script>

</body>
</html>
