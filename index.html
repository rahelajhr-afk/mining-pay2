<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pay USDT</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
padding:0 0 90px;
}

.bg{
position:fixed;
top:35%;
left:5%;
font-size:70px;
opacity:.05;
font-weight:bold;
}

.card{
background:#1f1f1f;
margin:15px;
padding:20px;
border-radius:20px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
}

.bottom{
position:fixed;
bottom:0;
display:flex;
width:100%;
}

.hide{
display:none;
}

input{
width:100%;
padding:15px;
margin:8px 0;
}

</style>

</head>

<body>

<div class="bg">
PAY USDT
</div>

<div id="home" class="page">

<div class="card">

<h2>Balance</h2>

<p id="balance">
0.00 PAY USDT
</p>

</div>

<div class="card">

<h2>Mining</h2>

<h1 id="timer">
Loading...
</h1>

<button id="claimBtn">
Claim 0.05
</button>

</div>

</div>


<div id="refer"
class="page hide">

<h2>Referral</h2>

<p>
0.20 PAY USDT per referral
</p>

<p>
Referral Count:0
</p>

</div>


<div id="withdraw"
class="page hide">

<h2>
Withdraw
</h2>

<input
placeholder="Binance ID">

<input
placeholder="Amount">

<button>
Withdraw
</button>

<p>
Minimum:2 PAY USDT
</p>

<p>
Payments arrive in 3-7 days
</p>

</div>


<div id="profile"
class="page hide">

Loading...

</div>


<div class="bottom">

<button onclick="show('home')">
Home
</button>

<button onclick="show('refer')">
Refer
</button>

<button onclick="show('withdraw')">
Withdraw
</button>

<button onclick="show('profile')">
Profile
</button>

</div>


<script>

const tg=
window.Telegram.WebApp;

tg.expand();

let user=
tg.initDataUnsafe?.user;

if(user){

let uid=
localStorage.getItem(
"userUID"
);

if(!uid){

uid=
"UID"+
Date.now()+
Math.floor(
Math.random()*999
);

localStorage
.setItem(
"userUID",
uid
)

}

document
.getElementById(
"profile"
)

.innerHTML=

`

<h2>Profile</h2>

UID:
${uid}

<br><br>

Username:
${user.first_name}

`

}


function show(id){

document
.querySelectorAll(".page")
.forEach(x=>{

x.classList
.add("hide")

})

document
.getElementById(id)
.classList
.remove("hide")

}



let balance=
localStorage
.getItem("bal")||0

let last=
localStorage
.getItem("last")||0


document
.getElementById(
"balance"
)

.innerText=

balance+
" PAY USDT"



function update(){

let now=
Date.now()

let diff=
86400000-
(now-last)

if(diff<=0){

document
.getElementById(
"timer"
)

.innerText=
"Ready"

}else{

let h=
Math.floor(
diff/1000/60/60
)

let m=
Math.floor(
(diff/1000/60)%60
)

let s=
Math.floor(
(diff/1000)%60
)

document
.getElementById(
"timer"
)

.innerText=

h+":"+
m+":"+
s

}

}

setInterval(
update,
1000
)

update()



document
.getElementById(
"claimBtn"
)

.onclick=()=>{

let now=
Date.now()

if(
now-last
>=86400000
){

balance=
parseFloat(
balance
)+0.05

localStorage
.setItem(
"bal",
balance
)

localStorage
.setItem(
"last",
now
)

location.reload()

}else{

alert(
"Come after 24h"
)

}

}

</script>

</body>
</html>
