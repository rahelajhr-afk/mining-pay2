<script>

const tg=window.Telegram?.WebApp

let username="Guest"
let telegramId="demo"

if(
tg &&
tg.initDataUnsafe &&
tg.initDataUnsafe.user
){

let u=
tg.initDataUnsafe.user

username=
u.first_name

telegramId=
String(u.id)

}

let uid=
"UID"+telegramId


document
.getElementById(
"profileData"
)

.innerHTML=

`

<h2>Profile</h2>

UID:
${uid}

<br><br>

Username:
${username}

`

document
.getElementById(
"refLink"
)

.value=

"https://t.me/MiningPayBot?start="+telegramId



let balance=

parseFloat(

localStorage.getItem(
"bal_"+telegramId
)

||0

)


document
.getElementById(
"balance"
)

.innerText=

balance.toFixed(2)
+
" PAY USDT"



document
.getElementById(
"refs"
)

.innerText=

localStorage.getItem(
"refs_"+telegramId
)
||0



function copyRef(){

navigator
.clipboard
.writeText(

document
.getElementById(
"refLink"
).value

)

alert(
"Copied"
)

}



function show(id){

document
.querySelectorAll(
".page"
)

.forEach(x=>{

x.classList
.add("hide")

})

document
.getElementById(
id
)

.classList
.remove(
"hide"
)

}



let last=

localStorage.getItem(
"last_"+telegramId
)

||0



function update(){

let now=
Date.now()

let diff=
86400000-
(now-last)

if(diff<=0){

document
.getElementById(
"timer"
)

.innerText=
"Ready"

}else{

let h=
Math.floor(
diff/1000/60/60
)

let m=
Math.floor(
(diff/1000/60)%60
)

let s=
Math.floor(
(diff/1000)%60
)

document
.getElementById(
"timer"
)

.innerText=

h+":"+
m+":"+
s

}

}


setInterval(
update,
1000
)

update()



document
.getElementById(
"claimBtn"
)

.onclick=()=>{

let now=
Date.now()

if(
now-last
>=86400000
){

balance=
balance+0.05


localStorage
.setItem(

"bal_"+telegramId,

balance

)


localStorage
.setItem(

"last_"+telegramId,

now

)

location.reload()

}else{

alert(
"Come after 24h"
)

}

}

  </script>
