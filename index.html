<script>

const tg=window.Telegram?.WebApp;

let username="DemoUser";
let telegramId="";

if(
tg &&
tg.initDataUnsafe &&
tg.initDataUnsafe.user
){

let user=tg.initDataUnsafe.user;

username=user.first_name;

telegramId=String(user.id);

}else{

telegramId=
localStorage.getItem(
"demoid"
);

if(!telegramId){

telegramId=
String(
Date.now()+
Math.floor(Math.random()*9999)
);

localStorage.setItem(
"demoid",
telegramId
);

}

}

let uid=
"UID_"+telegramId;


document
.getElementById(
"profileData"
)

.innerHTML=

`

<h2>Profile</h2>

UID:
${uid}

<br><br>

Username:
${username}

`;


document
.getElementById(
"refLink"
)

.value=

"https://t.me/MiningPayBot?start="+uid;



let balance=

parseFloat(

localStorage.getItem(
"bal_"+telegramId
)||0

);



document
.getElementById(
"balance"
)

.innerText=

balance.toFixed(2)
+" PAY USDT";


document
.getElementById(
"refs"
)

.innerText=

localStorage.getItem(
"refs_"+telegramId
)

||0;


function copyRef(){

navigator.clipboard.writeText(

document
.getElementById(
"refLink"
).value

);

alert("Copied");

}


function show(id){

document
.querySelectorAll(
".page"
)

.forEach(x=>{

x.classList.add(
"hide"
)

})

document
.getElementById(id)
.classList.remove(
"hide"
)

}


let last=

localStorage.getItem(
"last_"+telegramId
)

||0;



function update(){

let now=Date.now();

let diff=
86400000-(now-last);

if(diff<=0){

document
.getElementById(
"timer"
)

.innerText=
"Ready";

}else{

let h=
Math.floor(
diff/1000/60/60
);

let m=
Math.floor(
(diff/1000/60)%60
);

let s=
Math.floor(
(diff/1000)%60
);

document
.getElementById(
"timer"
)

.innerText=

h+":"+
m+":"+
s;

}

}

update();

setInterval(
update,
1000
);



document
.getElementById(
"claimBtn"
)

.onclick=()=>{

let now=
Date.now();

if(
now-last>=86400000
){

balance+=0.05;

localStorage.setItem(
"bal_"+telegramId,
balance
);

localStorage.setItem(
"last_"+telegramId,
now
);

location.reload();

}else{

alert(
"Come after 24h"
)

}

}

  </script>
