<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pay USDT</title>
<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
padding-bottom:80px;
}

.bg{
position:fixed;
top:40%;
left:10%;
font-size:60px;
opacity:.05;
}

.card{
background:#1e1e1e;
margin:15px;
padding:20px;
border-radius:20px;
}

.bottom{
position:fixed;
bottom:0;
display:flex;
width:100%;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
}

.hide{
display:none;
}

input{
width:100%;
padding:15px;
margin:10px 0;
}

</style>
</head>

<body>

<div class="bg">PAY USDT</div>

<div id="home" class="page">

<h1>Pay USDT Mining</h1>

<div class="card">

Balance:
<p id="bal">0.00 PAY USDT</p>

</div>

<div class="card">

Daily Claim

<h2 id="timer">
24:00:00
</h2>

<button>
Claim 0.05
</button>

</div>

</div>

<div id="refer" class="page hide">

<h2>Referral</h2>

0.20 PAY USDT per referral

</div>

<div id="withdraw"
class="page hide">

<h2>Withdraw</h2>

<input
placeholder="Binance ID">

<input
placeholder="Amount">

<button>
Withdraw
</button>

<p>
Minimum:
2 PAY USDT
</p>

<p>
Payment:
3-7 days
</p>

</div>

<div id="profile"
class="page hide">

UID: UID001

<br><br>

Username: User

</div>

<div class="bottom">

<button onclick="show('home')">
Home
</button>

<button onclick="show('refer')">
Refer
</button>

<button onclick="show('withdraw')">
Withdraw
</button>

<button onclick="show('profile')">
Profile
</button>

</div>

<script>

function show(id){

document
.querySelectorAll(".page")
.forEach(a=>{

a.classList
.add("hide")

})

document
.getElementById(id)
.classList
.remove("hide")

}

</script>

</body>
</html>
